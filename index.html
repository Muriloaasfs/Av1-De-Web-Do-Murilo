<!DOCTYPE html>
<html lang="pt-br">
<head>

    <title>AV1 - Murilo</title>
</head>
<body>

    <h1>Lista de Tarefas do Murilo</h1>

    <form id="formTarefa">

    <p id="mensagemErro"></p>

    <ul id="listaTarefas"></ul>

    <script src="js/script.js"></script>
